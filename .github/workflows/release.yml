name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to release"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-22.04
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_notes: ${{ steps.version.outputs.release_notes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          subject="$(git log -1 --pretty=%s)"
          bump=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            bump="${{ inputs.bump }}"
          elif [[ "$subject" =~ ^feat(\(.+\))?!?: ]]; then
            bump="minor"
          elif [[ "$subject" =~ ^fix(\(.+\))?: ]]; then
            bump="patch"
          fi

          if [[ -z "$bump" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No release for commit subject: $subject"
            exit 0
          fi

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [[ -z "$latest_tag" ]]; then
            version="0.1.0"
          else
            raw="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$raw"

            case "$bump" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "Unsupported bump: $bump" >&2
                exit 1
                ;;
            esac

            version="$major.$minor.$patch"
          fi

          tag="v$version"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists." >&2
            exit 1
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          {
            echo "release_notes<<EOF"
            echo "Automated MyKVM release from commit:"
            echo ""
            echo "- $subject"
            echo ""
            echo "Changes since ${latest_tag:-project start}:"
            if [[ -z "$latest_tag" ]]; then
              git log --pretty=format:'- %s'
            else
              git log "$latest_tag"..HEAD --pretty=format:'- %s'
            fi
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "MyKVM ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
          - os: ubuntu-22.04
            name: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        run: rustup default stable

      - name: Install dependencies
        run: npm ci

      - name: Apply release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.RELEASE_VERSION;
          for (const file of ['package.json', 'src-tauri/tauri.conf.json']) {
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            data.version = version;
            fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          }
          NODE

      - name: Build web app
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Check Tauri backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build and publish desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "MyKVM ${{ needs.prepare.outputs.tag }}"
          releaseBody: ${{ needs.prepare.outputs.release_notes }}
          releaseDraft: false
          prerelease: false
