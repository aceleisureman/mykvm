name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to release"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-22.04
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_notes: ${{ steps.version.outputs.release_notes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          subject="$(git log -1 --pretty=%s)"
          bump=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            bump="${{ inputs.bump }}"
          elif [[ "$subject" =~ ^feat(\(.+\))?!?: ]]; then
            bump="minor"
          elif [[ "$subject" =~ ^fix(\(.+\))?: ]]; then
            bump="patch"
          fi

          if [[ -z "$bump" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No release for commit subject: $subject"
            exit 0
          fi

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [[ -z "$latest_tag" ]]; then
            version="0.1.0"
          else
            raw="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$raw"

            case "$bump" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "Unsupported bump: $bump" >&2
                exit 1
                ;;
            esac

            version="$major.$minor.$patch"
          fi

          tag="v$version"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists." >&2
            exit 1
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          {
            echo "release_notes<<EOF"
            echo "Automated MyKVM release from commit:"
            echo ""
            echo "- $subject"
            echo ""
            echo "Downloads:"
            echo "- macOS: download the .dmg, then drag MyKVM to Applications. The .app.tar.gz file is for automatic updates only."
            echo "- Windows: download the .exe or .msi installer."
            echo "- Linux: download the AppImage, .deb, or .rpm package."
            echo ""
            echo "Changes since ${latest_tag:-project start}:"
            if [[ -z "$latest_tag" ]]; then
              git log --pretty=format:'- %s'
            else
              git log "$latest_tag"..HEAD --pretty=format:'- %s'
            fi
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "MyKVM ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macos
            args: --ci --target universal-apple-darwin
          - os: windows-latest
            name: windows
            args: --ci
          - os: ubuntu-22.04
            name: linux
            args: --ci

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        run: rustup default stable

      - name: Add macOS Rust targets
        if: matrix.name == 'macos'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required to create signed updater artifacts."
            exit 1
          fi

      - name: Apply release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.RELEASE_VERSION;
          for (const file of ['package.json', 'src-tauri/tauri.conf.json']) {
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            data.version = version;
            fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          }
          NODE

      - name: Validate Apple signing secrets
        if: matrix.name == 'macos'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_PRIVATE_KEY: ${{ secrets.APPLE_API_KEY_PRIVATE_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=0
          require() {
            if [ -z "${!1:-}" ]; then
              echo "::error::$1 is required for a signed and notarized macOS release."
              missing=1
            fi
          }

          require APPLE_CERTIFICATE
          require APPLE_CERTIFICATE_PASSWORD
          require APPLE_SIGNING_IDENTITY

          if [ -n "$APPLE_API_KEY_PRIVATE_KEY$APPLE_API_KEY_ID$APPLE_API_ISSUER" ]; then
            require APPLE_API_KEY_PRIVATE_KEY
            require APPLE_API_KEY_ID
            require APPLE_API_ISSUER
          else
            require APPLE_ID
            require APPLE_PASSWORD
            require APPLE_TEAM_ID
          fi

          exit "$missing"

      - name: Write Apple notarization API key
        if: matrix.name == 'macos'
        shell: bash
        env:
          APPLE_API_KEY_PRIVATE_KEY: ${{ secrets.APPLE_API_KEY_PRIVATE_KEY }}
        run: |
          if [ -n "$APPLE_API_KEY_PRIVATE_KEY" ]; then
            mkdir -p "$RUNNER_TEMP/apple-notary"
            printf '%s' "$APPLE_API_KEY_PRIVATE_KEY" > "$RUNNER_TEMP/apple-notary/AuthKey.p8"
            echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/apple-notary/AuthKey.p8" >> "$GITHUB_ENV"
          fi

      - name: Build web app
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Check Tauri backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build and publish desktop bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "MyKVM ${{ needs.prepare.outputs.tag }}"
          releaseBody: ${{ needs.prepare.outputs.release_notes }}
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true

      - name: Verify macOS signing and notarization
        if: matrix.name == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          app_path="$(find src-tauri/target -path '*/release/bundle/macos/*.app' -type d | head -n 1)"
          dmg_path="$(find src-tauri/target -path '*/release/bundle/dmg/*.dmg' -type f | head -n 1)"
          tar_path="$(find src-tauri/target -path '*/release/bundle/macos/*.app.tar.gz' -type f | head -n 1)"

          if [ -z "$app_path" ]; then
            echo "::error::No macOS .app bundle was produced."
            exit 1
          fi

          if [ -z "$dmg_path" ]; then
            echo "::error::No macOS .dmg installer was produced."
            exit 1
          fi

          if [ -z "$tar_path" ] || [ ! -f "$tar_path.sig" ]; then
            echo "::error::No signed macOS updater .app.tar.gz artifact was produced."
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl -a -t exec -vv "$app_path"
          codesign --verify --verbose=2 "$dmg_path"
          spctl -a -t open --context context:primary-signature -vv "$dmg_path"

  assemble-latest-json:
    name: Assemble updater manifest
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dl
          gh release download "$TAG" --dir dl --repo "$GITHUB_REPOSITORY" --clobber
          find dl -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const dir = 'dl';
          const files = fs.readdirSync(dir);
          const tag = process.env.TAG;
          const version = process.env.VERSION;
          const baseUrl = `https://github.com/${process.env.REPO}/releases/download/${tag}`;
          const assetUrl = (name) => `${baseUrl}/${encodeURIComponent(name)}`;
          const signatureFor = (name) => {
            const sigName = `${name}.sig`;
            return files.includes(sigName)
              ? fs.readFileSync(path.join(dir, sigName), 'utf8').trim()
              : null;
          };
          const platforms = {};

          const addPlatform = (key, assetName) => {
            const signature = signatureFor(assetName);
            if (!signature) {
              console.warn(`Skipping ${key}: missing signature for ${assetName}`);
              return false;
            }

            platforms[key] = {
              signature,
              url: assetUrl(assetName),
            };
            return true;
          };

          const macAsset = files.find((name) => /\.app\.tar\.gz$/i.test(name));
          if (!macAsset) {
            throw new Error('No macOS updater .app.tar.gz asset found.');
          }
          const macAdded =
            addPlatform('darwin-aarch64', macAsset) &&
            addPlatform('darwin-x86_64', macAsset);
          if (!macAdded) {
            throw new Error(`Missing signature for macOS updater asset ${macAsset}.`);
          }

          const windowsAsset = files.find(
            (name) =>
              !name.endsWith('.sig') &&
              (/setup\.exe$/i.test(name) || /\.msi$/i.test(name)),
          );
          if (windowsAsset) {
            addPlatform('windows-x86_64', windowsAsset);
          }

          const linuxAsset = files.find(
            (name) =>
              !name.endsWith('.sig') &&
              /\.AppImage$/i.test(name) &&
              /(amd64|x86_64)/i.test(name),
          );
          if (linuxAsset) {
            addPlatform('linux-x86_64', linuxAsset);
          }

          fs.writeFileSync(
            'latest.json',
            `${JSON.stringify(
              {
                version,
                notes: `Release ${tag}`,
                pub_date: new Date().toISOString(),
                platforms,
              },
              null,
              2,
            )}\n`,
          );

          console.log(fs.readFileSync('latest.json', 'utf8'));
          NODE

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" latest.json --clobber --repo "$GITHUB_REPOSITORY"
